<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Şoför Sorun Kayıtları — Yönetim Paneli</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="tailwind-built.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="session-manager.js"></script>
  <style>
    :root {
      --rp-bg: #f1f5f9;
      --rp-surface: #ffffff;
      --rp-border: #e2e8f0;
      --rp-text: #334155;
      --rp-muted: #64748b;
      --rp-accent: #4f46e5;
      --rp-accent-hover: #4338ca;
      --rp-accent-soft: #eef2ff;
      --rp-header-from: #1e293b;
      --rp-header-to: #4338ca;
      --rp-danger: #dc2626;
      --rp-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    body.rp-page {
      background: var(--rp-bg);
      color: var(--rp-text);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    .rp-header {
      background: linear-gradient(to right, var(--rp-header-from), var(--rp-header-to));
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--rp-shadow);
    }

    .rp-logo-box {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0;
    }

    .rp-header-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    .rp-header-sub {
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.78);
      margin-top: 2px;
    }

    .rp-btn-header {
      font-size: 0.8125rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.22);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
    }

    .rp-btn-header:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .rp-page-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .rp-page-desc {
      font-size: 0.875rem;
      color: var(--rp-muted);
      margin-top: 0.25rem;
    }

    .rp-panel {
      background: var(--rp-surface);
      border: 1px solid var(--rp-border);
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .rp-section {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--rp-border);
    }

    .rp-section:last-child {
      border-bottom: none;
    }

    .rp-section-muted {
      background: #f8fafc;
    }

    .rp-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--rp-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.375rem;
    }

    .rp-input,
    .rp-select,
    .rp-textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--rp-border);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--rp-text);
      background: #fff;
    }

    .rp-input:focus,
    .rp-select:focus,
    .rp-textarea:focus {
      outline: none;
      border-color: var(--rp-accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .rp-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.5rem 0.875rem;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .rp-btn-primary {
      background: var(--rp-accent);
      color: #fff;
      border-color: var(--rp-accent);
    }

    .rp-btn-primary:hover {
      background: var(--rp-accent-hover);
      border-color: var(--rp-accent-hover);
    }

    .rp-btn-secondary {
      background: #fff;
      color: var(--rp-text);
      border-color: var(--rp-border);
    }

    .rp-btn-secondary:hover {
      background: #f8fafc;
    }

    .rp-btn-danger {
      background: var(--rp-danger);
      color: #fff;
      border-color: #b91c1c;
    }

    .rp-btn-danger:hover {
      background: #b91c1c;
    }

    .rp-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .rp-section-icon {
      width: 2rem;
      height: 2rem;
      border-radius: 8px;
      background: var(--rp-accent-soft);
      color: var(--rp-accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
    }

    .rp-driver-box {
      padding: 0.625rem 0.875rem;
      background: var(--rp-accent-soft);
      border: 1px solid #c7d2fe;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #3730a3;
    }

    .rp-reject-box {
      margin-top: 1rem;
      padding: 1rem;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
    }

    .rp-reject-title {
      font-size: 0.875rem;
      font-weight: 700;
      color: #92400e;
      margin-bottom: 0.75rem;
    }

    #issuesList {
      max-height: 50vh;
      overflow-y: auto;
    }

    .issue-card.issue-open {
      background-color: #fff !important;
      border-color: #fca5a5 !important;
      color: #0f172a !important;
    }

    .issue-card.issue-closed {
      background-color: #f8fafc !important;
      border-color: var(--rp-border) !important;
      opacity: 0.85;
    }
  </style>
</head>
<body class="rp-page">
  <header class="rp-header">
    <div class="max-w-7xl mx-auto px-4 py-5 flex items-center justify-between gap-4 flex-wrap">
      <div class="flex items-center gap-3 min-w-0">
        <div class="rp-logo-box" aria-hidden="true">AT</div>
        <div class="min-w-0">
          <div class="rp-header-title">Araç Takip</div>
          <div class="rp-header-sub">Yönetim Paneli</div>
        </div>
      </div>
      <button type="button" id="backBtn" class="rp-btn-header">Ana Sayfa</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="mb-6">
      <h1 class="rp-page-title">Şoför / Plaka Sorun Kayıtları</h1>
      <p class="rp-page-desc">Plaka girince kayıtlar listelenir. Tarih, not ve fotoğraf ekleyebilirsiniz.</p>
    </div>

    <input type="hidden" id="imzaKantarAd" value="" />

    <div id="issuesPageRoot" class="rp-panel flex flex-col">
      <section class="rp-section rp-section-muted">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label for="issuesPlateInput" class="rp-label">Plaka</label>
            <input id="issuesPlateInput" type="text" placeholder="34ABC123" class="rp-input max-w-none" autocomplete="off">
          </div>
          <div>
            <label class="rp-label">Şoför Bilgisi</label>
            <div id="issuesDriverInfo" class="rp-driver-box hidden">
              <div id="issuesDriverName" class="font-semibold"></div>
              <div id="issuesDriverPhone" class="text-sm opacity-80 mt-0.5"></div>
            </div>
          </div>
          <div class="flex flex-col justify-end gap-3">
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input id="issuesShowClosed" type="checkbox" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
              <span>Kapatılanları göster</span>
            </label>
            <div class="flex flex-wrap gap-2">
              <button id="issuesRefreshBtn" type="button" class="rp-btn rp-btn-primary">
                <i class="fas fa-list" aria-hidden="true"></i> Listele
              </button>
              <button id="issuesClearPlateBtn" type="button" class="rp-btn rp-btn-danger">
                <i class="fas fa-eraser" aria-hidden="true"></i> Temizle
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="rp-section">
        <div class="flex items-center justify-between gap-4 mb-4 flex-wrap">
          <h2 class="rp-section-title">
            <span class="rp-section-icon"><i class="fas fa-plus" aria-hidden="true"></i></span>
            Yeni sorun ekle
          </h2>
          <div class="flex items-center gap-3 flex-wrap">
            <div id="issuesAddMsg" class="text-sm font-medium text-slate-600"></div>
            <button id="issuesAddBtn" type="button" class="rp-btn rp-btn-primary">
              <i class="fas fa-save" aria-hidden="true"></i> Kaydet
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="issuesDateInput" class="rp-label">Tarih / Saat</label>
            <input id="issuesDateInput" type="datetime-local" class="rp-input max-w-none">
          </div>
          <div>
            <label for="issuesTypeSelect" class="rp-label">Sorun tipi</label>
            <select id="issuesTypeSelect" class="rp-select">
              <option value="">(Seçiniz)</option>
              <option value="Baret Takmama">Baret takmama</option>
              <option value="Kantar Tartışması">Kantar tartışması</option>
              <option value="Sevkiyat Personeliyle Tartışma">Sevkiyat personeliyle tartışma</option>
              <option value="Saha Kuralına Uymama">Saha kuralına uymama</option>
              <option value="Sıra / Yoğunluk İhlali">Sıra / yoğunluk ihlali</option>
              <option value="Diğer">Diğer</option>
            </select>
          </div>
          <div>
            <label for="issuesPhotoInput" class="rp-label">Fotoğraf</label>
            <input id="issuesPhotoInput" type="file" accept="image/*" capture="environment" class="rp-input max-w-none text-sm file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-indigo-50 file:text-indigo-700 file:font-medium">
          </div>
          <div>
            <label for="issuesNoteInput" class="rp-label">Olay notu</label>
            <textarea id="issuesNoteInput" rows="4" placeholder="Örn: Kantarda sıra kuralına uymadı..." class="rp-textarea resize-none"></textarea>
          </div>
        </div>

        <div class="rp-reject-box">
          <h3 class="rp-reject-title">Araç reddetme (isteğe bağlı)</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label for="rejectionDurationSelect" class="rp-label">Red süresi</label>
              <select id="rejectionDurationSelect" class="rp-select">
                <option value="">Reddetme yok</option>
                <option value="1_month">1 ay</option>
                <option value="3_months">3 ay</option>
                <option value="6_months">6 ay</option>
                <option value="1_year">1 yıl</option>
                <option value="unlimited">Süresiz</option>
                <option value="custom">Özel gün</option>
              </select>
            </div>
            <div id="customDaysContainer" class="hidden">
              <label for="customDaysInput" class="rp-label">Gün sayısı</label>
              <input id="customDaysInput" type="number" min="1" max="365" placeholder="1–365 gün" class="rp-input max-w-none">
            </div>
          </div>
        </div>
      </section>

      <section class="rp-section rp-section-muted">
        <h2 class="rp-section-title mb-4">
          <span class="rp-section-icon"><i class="fas fa-clipboard-list" aria-hidden="true"></i></span>
          Geçmiş kayıtlar
        </h2>
        <div id="issuesList"></div>
      </section>
    </div>
  </main>

  <script src="issues-sync-bus.js"></script>
  <script src="issues-page.js"></script>
</body>
</html>
